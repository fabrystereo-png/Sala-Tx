<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOC — Sistema de Gestión de Nodos</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-2H5S29NZ9Y"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-2H5S29NZ9Y');</script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#05080f;--panel:#0a1020;--border:#162030;--accent:#00aaff;--accent2:#00ffcc;--warn:#ffaa00;--danger:#ff3344;--text:#9ab8d0;--dim:#3a5060;--glow:0 0 20px rgba(0,170,255,0.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}

/* Animated background */
.bg-anim{position:fixed;inset:0;z-index:0}
.bg-anim canvas{width:100%;height:100%}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,170,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,170,255,0.03) 1px,transparent 1px);background-size:50px 50px;z-index:0}
.bg-scan{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.1) 3px,rgba(0,0,0,0.1) 4px);z-index:0;pointer-events:none}

/* Floating nodes background decoration */
.nodes-bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.node-dot{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:0.15;animation:floatNode 8s infinite ease-in-out}
@keyframes floatNode{0%,100%{transform:translateY(0) scale(1);opacity:0.15}50%{transform:translateY(-20px) scale(1.5);opacity:0.4}}

.login-wrap{position:relative;z-index:10;width:100%;max-width:420px;padding:20px}

/* Logo area */
.logo-area{text-align:center;margin-bottom:40px}
.logo-icon{font-size:2.5rem;margin-bottom:12px;filter:drop-shadow(0 0 12px rgba(0,170,255,0.6))}
.logo-title{font-family:'Orbitron',sans-serif;font-size:1.4rem;font-weight:900;color:#fff;letter-spacing:4px;text-shadow:var(--glow)}
.logo-sub{font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--dim);letter-spacing:6px;margin-top:6px}
.logo-line{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:16px auto}

/* Card */
.login-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:36px 32px;position:relative;overflow:hidden}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent)}
.login-card::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top,rgba(0,170,255,0.04),transparent 70%);pointer-events:none}

.card-title{font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:var(--dim);letter-spacing:4px;text-transform:uppercase;margin-bottom:28px;display:flex;align-items:center;gap:10px}
.card-title::after{content:'';flex:1;height:1px;background:var(--border)}

.field{margin-bottom:20px}
.field label{display:block;font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:var(--dim);letter-spacing:2px;margin-bottom:8px;text-transform:uppercase}
.field input{width:100%;background:rgba(0,170,255,0.04);border:1px solid var(--border);color:#fff;padding:12px 16px;font-family:'Share Tech Mono',monospace;font-size:0.85rem;border-radius:4px;outline:none;transition:all 0.2s}
.field input:focus{border-color:var(--accent);background:rgba(0,170,255,0.08);box-shadow:0 0 0 3px rgba(0,170,255,0.1)}
.field input::placeholder{color:var(--dim)}

.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,rgba(0,170,255,0.15),rgba(0,255,204,0.1));border:1px solid var(--accent);color:var(--accent);font-family:'Orbitron',sans-serif;font-size:0.8rem;font-weight:700;letter-spacing:3px;cursor:pointer;border-radius:4px;transition:all 0.3s;margin-top:8px;position:relative;overflow:hidden}
.btn-login::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent),var(--accent2));opacity:0;transition:opacity 0.3s}
.btn-login:hover::before{opacity:0.15}
.btn-login:hover{box-shadow:var(--glow);transform:translateY(-1px)}
.btn-login:active{transform:translateY(0)}
.btn-login span{position:relative;z-index:1}

.error-msg{background:rgba(255,51,68,0.1);border:1px solid rgba(255,51,68,0.3);color:var(--danger);padding:10px 14px;border-radius:4px;font-family:'Share Tech Mono',monospace;font-size:0.72rem;margin-top:14px;display:none;text-align:center}
.error-msg.show{display:block}

/* Status bar at bottom */
.status-bar{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.status-item{display:flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;font-size:0.62rem;color:var(--dim)}
.status-dot{width:6px;height:6px;border-radius:50%;animation:pulse 2s infinite}
.status-dot.green{background:var(--accent2);box-shadow:0 0 6px rgba(0,255,204,0.5)}
.status-dot.blue{background:var(--accent);box-shadow:0 0 6px rgba(0,170,255,0.5);animation-delay:0.7s}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* Corner decorations */
.corner{position:absolute;width:16px;height:16px;border-color:var(--accent);border-style:solid;opacity:0.4}
.corner.tl{top:8px;left:8px;border-width:1px 0 0 1px}
.corner.tr{top:8px;right:8px;border-width:1px 1px 0 0}
.corner.bl{bottom:8px;left:8px;border-width:0 0 1px 1px}
.corner.br{bottom:8px;right:8px;border-width:0 1px 1px 0}

.version{text-align:center;margin-top:16px;font-family:'Share Tech Mono',monospace;font-size:0.6rem;color:var(--dim);opacity:0.5}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-scan"></div>
<div class="nodes-bg" id="nodesBg"></div>

<div class="login-wrap">
  <div class="logo-area">
    <div class="logo-icon">🛰️</div>
    <div class="logo-title">NOC PATAGONIA</div>
    <div class="logo-sub">SISTEMA DE GESTIÓN DE NODOS</div>
    <div class="logo-line"></div>
  </div>

  <div class="login-card">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="card-title">// ACCESO RESTRINGIDO</div>

    <div class="field">
      <label>Usuario</label>
      <input type="text" id="user" placeholder="usuario" autocomplete="off"/>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>

    <button class="btn-login" onclick="doLogin()"><span>INGRESAR AL SISTEMA</span></button>
    <div class="error-msg" id="errMsg">⚠ Credenciales incorrectas. Acceso denegado.</div>

    <div class="status-bar">
      <div class="status-item"><span class="status-dot green"></span>SISTEMA OPERATIVO</div>
      <div class="status-item"><span class="status-dot blue"></span>RED ACTIVA</div>
      <div class="status-item" id="clockSmall">--:--</div>
    </div>
  </div>
  <div class="version">NOC-SYS v2.1 · PATAGONIA SUR · COMODORO RIVADAVIA</div>
</div>

<script>
// Credenciales — cambiá estos valores
const USERS = {
  "admin": "noc2024",
  "tecnico": "tx2024"
};

function doLogin(){
  const u=document.getElementById('user').value.trim().toLowerCase();
  const p=document.getElementById('pass').value;
  const err=document.getElementById('errMsg');
  if(USERS[u] && USERS[u]===p){
    sessionStorage.setItem('noc_auth','1');
    sessionStorage.setItem('noc_user',u);
    window.location.href='/Sala-Tx/selector.html';
  } else {
    err.classList.add('show');
    document.getElementById('pass').value='';
    setTimeout(()=>err.classList.remove('show'),3000);
  }
}

// Floating nodes decoration
const nb=document.getElementById('nodesBg');
for(let i=0;i<20;i++){
  const d=document.createElement('div');
  d.className='node-dot';
  d.style.left=Math.random()*100+'%';
  d.style.top=Math.random()*100+'%';
  d.style.animationDelay=Math.random()*8+'s';
  d.style.animationDuration=(6+Math.random()*6)+'s';
  nb.appendChild(d);
}

// Clock
function tick(){const n=new Date();document.getElementById('clockSmall').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
setInterval(tick,1000);tick();
</script>
</body>
</html>
