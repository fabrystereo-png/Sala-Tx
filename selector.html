<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TX Patagonia — Mapa de Nodos (Cloud Sync)</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#05080f;--panel:#0a1020;--border:#162030;--accent:#00aaff;--accent2:#00ffcc;--warn:#ffaa00;--danger:#ff3344;--text:#9ab8d0;--dim:#3a5060}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:9999}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--panel);border-bottom:1px solid var(--border);height:52px;flex-shrink:0;z-index:1000;position:relative}
.logo{font-family:'Orbitron',sans-serif;font-size:.95rem;font-weight:900;color:var(--accent);letter-spacing:3px;text-shadow:0 0 15px rgba(0,170,255,.4)}
.logo span{display:block;font-size:.55rem;color:var(--dim);letter-spacing:5px;font-family:'Share Tech Mono',monospace;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:12px}
.clock{font-family:'Share Tech Mono',monospace;font-size:.8rem;color:var(--accent)}
.stats-bar{display:flex;align-items:stretch;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;z-index:999}
.stat-block{display:flex;align-items:center;gap:10px;padding:8px 18px;border-right:1px solid var(--border);cursor:pointer;flex:1;justify-content:center}
.stat-dot{width:11px;height:11px;border-radius:50%}
.stat-dot.g{background:#00cc66;box-shadow:0 0 8px rgba(0,204,102,.7)}
.stat-dot.y{background:var(--warn);box-shadow:0 0 8px rgba(255,170,0,.7)}
.stat-dot.r{background:var(--danger);box-shadow:0 0 8px rgba(255,51,68,.7);animation:sdPulse 1.5s infinite}
.stat-dot.gr{background:var(--dim)}
@keyframes sdPulse{0%,100%{opacity:1}50%{opacity:.3}}
.stat-n{font-family:'Orbitron',sans-serif;font-size:1.15rem;font-weight:700;color:#fff}
.stat-l{font-family:'Share Tech Mono',monospace;font-size:.55rem;color:var(--dim)}
.filter-bar{display:flex;align-items:center;gap:6px;padding:5px 14px;background:rgba(5,8,15,.95);border-bottom:1px solid var(--border)}
.fb{padding:3px 10px;background:transparent;border:1px solid var(--border);color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:.58rem;cursor:pointer;border-radius:3px}
.fb.on{border-color:var(--accent);color:var(--accent);background:rgba(0,170,255,.08)}
.main{display:flex;flex:1;overflow:hidden;position:relative}
#map{flex:1;z-index:1}
.leaflet-tile{filter:brightness(.28) saturate(.25) hue-rotate(190deg)!important}
.rpanel{width:300px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.rp-hdr{padding:9px 14px;border-bottom:1px solid var(--border);font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--dim)}
.rp-list{flex:1;overflow-y:auto}
.ni{padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.035);cursor:pointer;display:flex;align-items:center;gap:9px}
.ni-name{font-size:.78rem;font-weight:600;color:#fff}
.npop{background:rgba(8,13,24,.97);border:1px solid var(--border);border-radius:5px;overflow:hidden;min-width:210px}
.npop-hdr{padding:9px 12px;border-bottom:1px solid var(--border)}
.npop-name{font-family:'Orbitron',sans-serif;font-size:.75rem;color:#fff}
.npop-btn{display:block;width:100%;padding:7px;background:rgba(0,170,255,.1);border:none;color:var(--accent);cursor:pointer}
</style>
</head>
<body>

<header>
  <div class="logo">TX PATAGONIA <span>MONITOREO CLOUD</span></div>
  <div class="hdr-right">
    <div class="clock" id="clk">--:--:--</div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-block"><span class="stat-dot g"></span><div><div class="stat-n" id="sG">0</div><div class="stat-l">AL DÍA</div></div></div>
  <div class="stat-block"><span class="stat-dot y"></span><div><div class="stat-n" id="sY">0</div><div class="stat-l">POR VENCER</div></div></div>
  <div class="stat-block"><span class="stat-dot r"></span><div><div class="stat-n" id="sR">0</div><div class="stat-l">VENCIDO</div></div></div>
  <div class="stat-block"><span class="stat-dot gr"></span><div><div class="stat-n" id="sGr">0</div><div class="stat-l">S/D</div></div></div>
</div>

<div class="filter-bar">
  <button class="fb on" id="fb-all">TODOS</button>
  <input type="text" id="srch" placeholder="Buscar nodo..." oninput="render()" style="margin-left:auto; background:rgba(0,170,255,0.05); border:1px solid var(--border); color:white; padding:4px 10px; font-size:11px;">
</div>

<div class="main">
  <div id="map"></div>
  <div class="rpanel">
    <div class="rp-hdr">// ESTADO TIEMPO REAL</div>
    <div class="rp-list" id="rpList"></div>
  </div>
</div>

<script type="module">
  // IMPORTAR FIREBASE
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBR3LcAtfwfccaPJrGDny4nhi1n-XUdYrc",
    authDomain: "noc-patagonia.firebaseapp.com",
    projectId: "noc-patagonia",
    storageBucket: "noc-patagonia.firebasestorage.app",
    messagingSenderId: "24526360193",
    appId: "1:24526360193:web:bb6a64d58e63b09c5a8780",
    measurementId: "G-W28Y2XCLGX"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // NODOS INICIALES (Si la base está vacía, se cargan estos)
  const NODOS_ORIGINALES = [
    {id:'tx01centro', name:'Sala Tx01 — Centro', sub:'4TO PISO · CENTRAL', lat:-45.8645538, lng:-67.4921585, tipo:'central', zona:'crv', rel:null},
    {id:'tx02centro', name:'Sala Tx02 — Centro', sub:'1ER PISO · CENTRAL', lat:-45.8648000, lng:-67.4918000, tipo:'central', zona:'crv', rel:null},
    {id:'vpuey', name:'Sala Tx01 — V. Pueyrredón', sub:'CENTRAL GRANDE', lat:-45.8820458, lng:-67.5318774, tipo:'central', zona:'crv', rel:null},
    {id:'radatilly', name:'Sala Tx01 — Rada Tilly', sub:'CENTRAL', lat:-45.931528, lng:-67.556389, tipo:'central', zona:'crv', rel:null},
    {id:'cerrotanque', name:'Sala Tx01 — Cerro Tanque', sub:'CENTRAL ALTA', lat:-45.827361, lng:-67.519861, tipo:'central', zona:'crv', rel:null},
    {id:'laprida', name:'Sala Tx01 — Laprida', sub:'CENTRAL', lat:-45.8290701, lng:-67.5430865, tipo:'central', zona:'crv', rel:null},
    {id:'palazzo', name:'Tx01 — Palazzo', sub:'CENTRAL', lat:-45.7953957, lng:-67.4783992, tipo:'central', zona:'crv', rel:null},
    {id:'donbosco', name:'Shelter Tx01 — Don Bosco', sub:'SHELTER', lat:-45.7945, lng:-67.421528, tipo:'shelter', zona:'crv', rel:null},
    {id:'mosconi', name:'Sala Tx01 — Gral. Mosconi', sub:'CENTRAL', lat:-45.839167, lng:-67.479417, tipo:'central', zona:'crv', rel:null},
    {id:'menucos', name:'Menucos — Tx01', sub:'CENTRAL', lat:-45.968139, lng:-67.924389, tipo:'central', zona:'prov', rel:null},
    {id:'caletaolivia', name:'Caleta Olivia — Shelter Tx01', sub:'SHELTER', lat:-46.439167, lng:-67.5165, tipo:'shelter', zona:'prov', rel:null},
    {id:'picotruncado', name:'Pico Truncado — Tx01', sub:'CENTRAL', lat:-46.799139, lng:-67.959333, tipo:'central', zona:'prov', rel:null}
  ];

  let nodos = [...NODOS_ORIGINALES];
  let markers = {};
  let map;

  // ESCUCHAR CAMBIOS EN LA NUBE
  onSnapshot(doc(db, "nodos", "estado_general"), (docSnap) => {
    if (docSnap.exists()) {
      const cloudData = docSnap.data();
      nodos.forEach(n => {
        if(cloudData[n.id]) {
          n.rel = cloudData[n.id].rel || n.rel;
          n.lat = cloudData[n.id].lat || n.lat;
          n.lng = cloudData[n.id].lng || n.lng;
        }
      });
      render();
    } else {
      saveAllToCloud(); // Si no hay nada, subimos la base por primera vez
    }
  });

  async function saveAllToCloud() {
    const dataToSave = {};
    nodos.forEach(n => {
      dataToSave[n.id] = { rel: n.rel, lat: n.lat, lng: n.lng };
    });
    await setDoc(doc(db, "nodos", "estado_general"), dataToSave);
  }

  function initMap(){
    map = L.map('map').setView([-45.86, -67.49], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  }

  const SC={g:'#00cc66',y:'#ffaa00',r:'#ff3344',gr:'#3a5060'};
  function makeIcon(s){
    return L.divIcon({
      html:`<div style="width:14px;height:14px;border-radius:50%;background:${SC[s]};border:2px solid white;box-shadow:0 0 10px ${SC[s]}"></div>`,
      className:'', iconSize:[14,14]
    });
  }

  window.render = function(){
    if(!map) return;
    Object.values(markers).forEach(m => map.removeLayer(m));
    markers = {};
    let stats = {g:0, y:0, r:0, gr:0};

    const q = document.getElementById('srch').value.toLowerCase();

    nodos.forEach(n => {
      if(q && !n.name.toLowerCase().includes(q)) return;
      const s = getStatus(n.rel);
      stats[s]++;
      
      const mk = L.marker([n.lat, n.lng], {
        icon: makeIcon(s),
        draggable: true 
      }).addTo(map);

      mk.on('dragend', function(e) {
        const pos = e.target.getLatLng();
        n.lat = pos.lat;
        n.lng = pos.lng;
        saveAllToCloud(); 
      });

      mk.bindPopup(`<b>${n.name}</b><br>Relevamiento: ${n.rel || 'Sin fecha'}<br><button onclick="window.location.href='sala.html?id=${n.id}'" style="margin-top:5px; padding:4px; cursor:pointer">Abrir Sala</button>`);
      markers[n.id] = mk;
    });

    document.getElementById('sG').textContent = stats.g;
    document.getElementById('sY').textContent = stats.y;
    document.getElementById('sR').textContent = stats.r;
    document.getElementById('sGr').textContent = stats.gr;
    renderPanel();
  }

  function renderPanel(){
    const list = document.getElementById('rpList');
    list.innerHTML = nodos.map(n => `
      <div class="ni" onclick="map.setView([${n.lat}, ${n.lng}], 12)">
        <span style="width:8px;height:8px;border-radius:50%;background:${SC[getStatus(n.rel)]}"></span>
        <div class="ni-name">${n.name}</div>
      </div>
    `).join('');
  }

  function getStatus(rel){
    if(!rel) return 'gr';
    const m = (new Date() - new Date(rel))/(1000*60*60*24*30.44);
    return m < 6 ? 'g' : m < 12 ? 'y' : 'r';
  }

  initMap();
  setInterval(()=>{const n=new Date();document.getElementById('clk').textContent=n.toLocaleTimeString();},1000);
</script>
</body>
</html>
